# Copy to config.yaml and fill in your values.
# Override file path: CONFIG_PATH=/path/to/config.yaml

kkik:
  email: you@example.com
  password: your-password
  headless: true
  timeout_sec: 120
  # debug_dir: ./debug

email:
  to: you@example.com
  from: you@example.com
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: you@example.com
  smtp_password: your-gmail-app-password

# Optional: upload results to Google Sheets (OAuth — see README)
sheets:
  spreadsheet_id: ""
  sheet_name: Sheet1
  oauth_client_file: ./client_secret.json
  oauth_token_file: ./token.json

# Pipeline steps (all default to true). Env: STEPS_CRAWL, STEPS_EMAIL, STEPS_SHEET
steps:
  crawl: true   # live scrape + write CSV
  email: true   # SMTP report with CSV attachment
  sheet: true   # upload rows (also requires sheets.spreadsheet_id)
